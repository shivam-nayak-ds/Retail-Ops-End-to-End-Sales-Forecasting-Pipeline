RandomForest:
  n_estimators: 100
  max_depth: 10
  n_jobs: -1
  random_state: 42

XGBoost:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 5
  n_jobs: -1
  random_state: 42

LightGBM:
  n_estimators: 1000
  learning_rate: 0.02
  max_depth: 4
  n_jobs: -1
  random_state: 42
  verbosity: -1

# SEARCH SPACES FOR HYPERPARAMETER TUNING
search_space:
  RandomForest:
    n_estimators: [50, 100, 200]
    max_depth: [5, 10, 15]
  XGBoost:
    learning_rate: [0.01, 0.05, 0.1]
    max_depth: [3, 5, 7]
  LightGBM:
    learning_rate: [0.01, 0.05, 0.1]
    max_depth: [3, 5, 7]
