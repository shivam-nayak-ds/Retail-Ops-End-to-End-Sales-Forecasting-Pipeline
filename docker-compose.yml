# Docker Compose for Retail Ops MLOps Pipeline

services:
  # 1. Retail Forecasting API
  api:
    build: .
    container_name: retail_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    restart: always
    networks:
      - retail_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 1.5 Retail Frontend UI (Streamlit)
  frontend:
    build: .
    container_name: retail_frontend
    command: bash -c "pip install streamlit && streamlit run app_streamlit.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - api
    restart: always
    networks:
      - retail_network

  # 2. Prometheus (Metrics Collector)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - api
    networks:
      - retail_network
    restart: always

  # 3. Grafana (Visualization Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - retail_network
    restart: always

networks:
  retail_network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
