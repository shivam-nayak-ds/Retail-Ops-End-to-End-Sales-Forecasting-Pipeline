artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  train_csv: data/raw/train.csv
  store_csv: data/raw/store.csv
  local_data_file: artifacts/data_ingestion/raw_data.parquet
  train_data_file: artifacts/data_ingestion/train.parquet
  test_data_file: artifacts/data_ingestion/test.parquet

data_validation:
  root_dir: artifacts/data_validation
  status_file: artifacts/data_validation/status.txt
  schema_path: config/schema.yaml
  train_data_path: artifacts/data_ingestion/train.parquet
  required_columns: ["Store", "DayOfWeek", "Date", "Sales", "Customers", "Open", "Promo", "StateHoliday", "SchoolHoliday", "StoreType", "Assortment", "CompetitionDistance", "CompetitionOpenSinceMonth", "CompetitionOpenSinceYear", "Promo2", "Promo2SinceWeek", "Promo2SinceYear", "PromoInterval"]

data_transformation:
  root_dir: artifacts/data_transformation
  transformed_train_file: artifacts/data_transformation/train_transformed.parquet
  transformed_test_file: artifacts/data_transformation/test_transformed.parquet
  preprocessor_obj_file: artifacts/data_transformation/preprocessor.pkl

model_trainer:
  root_dir: artifacts/model_trainer
  model_path: artifacts/model_trainer/model.pkl
  base_accuracy_threshold: 0.6

model_evaluation:
  root_dir: artifacts/model_evaluation
  metrics_file: artifacts/model_evaluation/metrics.json

model_registry:
  root_dir: artifacts/model_registry
  model_name: "RetailSalesForecastingModel"
  status_file: artifacts/model_registry/status.txt
