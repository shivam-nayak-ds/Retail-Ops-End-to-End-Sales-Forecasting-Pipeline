# ─────────────────────────────────────────────────────────────
#  Retail-Ops Sales Forecasting Pipeline — Model Hyperparameters
#  These are the BASE params. Optuna (Phase 6) will override them.
# ─────────────────────────────────────────────────────────────

lightgbm:
  objective: regression
  metric: rmse
  boosting_type: gbdt
  n_estimators: 1000
  learning_rate: 0.05
  num_leaves: 63
  max_depth: -1
  min_child_samples: 20
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  reg_alpha: 0.1
  reg_lambda: 0.1
  random_state: 42
  n_jobs: -1
  verbose: -1
  early_stopping_rounds: 50

xgboost:
  objective: reg:squarederror
  eval_metric: rmse
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 6
  min_child_weight: 1
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1
  random_state: 42
  n_jobs: -1
  verbosity: 0
  early_stopping_rounds: 50

ensemble:
  lgbm_weight: 0.6
  xgb_weight: 0.4

optuna:
  n_trials: 50
  timeout: 600          # seconds
  direction: minimize   # minimize MAPE
  sampler: TPESampler
  pruner: MedianPruner
